<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Analytics Dashboard | Prarthi Kumari Portfolio</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg-primary: #050510;
            --bg-card: rgba(12, 12, 35, 0.65);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.07);
            --text-primary: #eaeaff;
            --text-secondary: #a4a4cc;
            --text-muted: #6a6a90;
            --accent-1: #8b5cf6;
            --accent-2: #3b82f6;
            --accent-3: #06d6a0;
            --accent-4: #f472b6;
            --accent-5: #38bdf8;
            --gradient-main: linear-gradient(135deg, #8b5cf6, #3b82f6, #06d6a0);
            --gradient-glow: linear-gradient(135deg, #8b5cf6, #3b82f6);
            --font-main: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Header */
        .dash-header {
            padding: 24px 32px;
            background: rgba(8, 8, 24, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .dash-header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .dash-header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .dash-header-left .back-link {
            font-size: 0.85rem;
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            transition: all 0.2s ease;
        }

        .dash-header-left .back-link:hover {
            border-color: var(--accent-1);
            color: var(--text-primary);
        }

        .dash-actions {
            display: flex;
            gap: 10px;
        }

        .btn-refresh, .btn-reset {
            padding: 8px 18px;
            border-radius: 50px;
            font-family: var(--font-main);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .btn-refresh {
            background: var(--gradient-glow);
            color: #fff;
            box-shadow: 0 4px 16px rgba(139, 92, 246, 0.3);
        }

        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(139, 92, 246, 0.5);
        }

        .btn-reset {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-reset:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.4);
        }

        /* Container */
        .dash-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        /* Stat Cards Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 28px;
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: 16px 16px 0 0;
        }

        .stat-card:nth-child(1)::before { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }
        .stat-card:nth-child(2)::before { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
        .stat-card:nth-child(3)::before { background: linear-gradient(90deg, #06d6a0, #34d399); }
        .stat-card:nth-child(4)::before { background: linear-gradient(90deg, #f472b6, #f9a8d4); }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border-color: rgba(139, 92, 246, 0.2);
        }

        .stat-card-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            margin-bottom: 16px;
        }

        .stat-card:nth-child(1) .stat-card-icon { background: rgba(139, 92, 246, 0.12); color: #a78bfa; }
        .stat-card:nth-child(2) .stat-card-icon { background: rgba(59, 130, 246, 0.12); color: #60a5fa; }
        .stat-card:nth-child(3) .stat-card-icon { background: rgba(6, 214, 160, 0.12); color: #34d399; }
        .stat-card:nth-child(4) .stat-card-icon { background: rgba(244, 114, 182, 0.12); color: #f9a8d4; }

        .stat-card-value {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .stat-card:nth-child(1) .stat-card-value { color: #a78bfa; }
        .stat-card:nth-child(2) .stat-card-value { color: #60a5fa; }
        .stat-card:nth-child(3) .stat-card-value { color: #34d399; }
        .stat-card:nth-child(4) .stat-card-value { color: #f9a8d4; }

        .stat-card-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Chart Panels */
        .panels-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        .panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 28px;
            backdrop-filter: blur(20px);
        }

        .panel-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
        }

        .panel-title i {
            color: var(--accent-1);
        }

        /* Section Views - Bar Chart */
        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .bar-row {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .bar-label {
            width: 100px;
            font-size: 0.82rem;
            color: var(--text-secondary);
            text-align: right;
            flex-shrink: 0;
        }

        .bar-track {
            flex: 1;
            height: 28px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            border-radius: 8px;
            transition: width 1s cubic-bezier(0.22, 1, 0.36, 1);
            display: flex;
            align-items: center;
            padding-left: 10px;
            font-size: 0.72rem;
            font-weight: 600;
            color: #fff;
            min-width: fit-content;
        }

        .bar-row:nth-child(1) .bar-fill { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }
        .bar-row:nth-child(2) .bar-fill { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
        .bar-row:nth-child(3) .bar-fill { background: linear-gradient(90deg, #06d6a0, #34d399); }
        .bar-row:nth-child(4) .bar-fill { background: linear-gradient(90deg, #f472b6, #f9a8d4); }
        .bar-row:nth-child(5) .bar-fill { background: linear-gradient(90deg, #38bdf8, #7dd3fc); }
        .bar-row:nth-child(6) .bar-fill { background: linear-gradient(90deg, #fbbf24, #fcd34d); }
        .bar-row:nth-child(7) .bar-fill { background: linear-gradient(90deg, #fb923c, #fdba74); }
        .bar-row:nth-child(8) .bar-fill { background: linear-gradient(90deg, #a78bfa, #c4b5fd); }

        /* Daily visits chart */
        .daily-chart {
            display: flex;
            align-items: flex-end;
            gap: 6px;
            height: 180px;
            padding-top: 20px;
        }

        .daily-bar-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            justify-content: flex-end;
            gap: 6px;
        }

        .daily-bar {
            width: 100%;
            max-width: 40px;
            border-radius: 6px 6px 2px 2px;
            background: var(--gradient-glow);
            transition: height 0.8s cubic-bezier(0.22, 1, 0.36, 1);
            min-height: 4px;
            position: relative;
        }

        .daily-bar:hover {
            filter: brightness(1.3);
        }

        .daily-bar-count {
            font-size: 0.68rem;
            font-weight: 600;
            color: var(--accent-5);
            text-align: center;
        }

        .daily-bar-date {
            font-size: 0.62rem;
            color: var(--text-muted);
            text-align: center;
            white-space: nowrap;
        }

        /* Recent Visits Table */
        .recent-table {
            width: 100%;
            border-collapse: collapse;
        }

        .recent-table th {
            text-align: left;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 14px;
            border-bottom: 1px solid var(--glass-border);
        }

        .recent-table td {
            font-size: 0.82rem;
            color: var(--text-secondary);
            padding: 10px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .recent-table tr:hover td {
            background: rgba(139, 92, 246, 0.04);
        }

        .time-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.72rem;
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-5);
            font-weight: 500;
        }

        /* Loading state */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .loading i {
            font-size: 2rem;
            margin-bottom: 16px;
            display: block;
            color: var(--accent-1);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 2.5rem;
            margin-bottom: 12px;
            color: var(--accent-1);
            opacity: 0.4;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .panels-row {
                grid-template-columns: 1fr;
            }

            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }

            .dash-header {
                padding: 16px 20px;
            }

            .dash-header h1 {
                font-size: 1.1rem;
            }

            .bar-label {
                width: 70px;
                font-size: 0.72rem;
            }
        }

        @media (max-width: 480px) {
            .stats-row {
                grid-template-columns: 1fr;
            }

            .dash-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--gradient-glow); border-radius: 3px; }
    </style>
</head>
<body>

    <header class="dash-header">
        <div class="dash-header-left">
            <h1><i class="fas fa-chart-line"></i> Analytics Dashboard</h1>
            <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Portfolio</a>
        </div>
        <div class="dash-actions">
            <button class="btn-refresh" id="btn-refresh" onclick="loadAnalytics()">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
            <button class="btn-reset" id="btn-reset" onclick="resetAnalytics()">
                <i class="fas fa-trash-alt"></i> Reset
            </button>
        </div>
    </header>

    <div class="dash-container">

        <!-- Top Stats -->
        <div class="stats-row" id="stats-row">
            <div class="stat-card">
                <div class="stat-card-icon"><i class="fas fa-eye"></i></div>
                <div class="stat-card-value" id="total-visits">—</div>
                <div class="stat-card-label">Total Visits</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon"><i class="fas fa-users"></i></div>
                <div class="stat-card-value" id="unique-visitors">—</div>
                <div class="stat-card-label">Unique Visitors</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon"><i class="fas fa-calendar-day"></i></div>
                <div class="stat-card-value" id="today-visits">—</div>
                <div class="stat-card-label">Today's Visits</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon"><i class="fas fa-trophy"></i></div>
                <div class="stat-card-value" id="top-section">—</div>
                <div class="stat-card-label">Most Viewed Section</div>
            </div>
        </div>

        <!-- Charts -->
        <div class="panels-row">

            <!-- Section Views -->
            <div class="panel">
                <h3 class="panel-title"><i class="fas fa-layer-group"></i> Section Views</h3>
                <div class="bar-chart" id="section-chart">
                    <div class="loading"><i class="fas fa-spinner"></i> Loading data...</div>
                </div>
            </div>

            <!-- Daily Visits -->
            <div class="panel">
                <h3 class="panel-title"><i class="fas fa-chart-bar"></i> Daily Visits (Last 14 Days)</h3>
                <div class="daily-chart" id="daily-chart">
                    <div class="loading"><i class="fas fa-spinner"></i> Loading data...</div>
                </div>
            </div>

        </div>

        <!-- Recent Visits -->
        <div class="panel">
            <h3 class="panel-title"><i class="fas fa-clock"></i> Recent Visits</h3>
            <div style="overflow-x: auto;" id="recent-visits-container">
                <div class="loading"><i class="fas fa-spinner"></i> Loading data...</div>
            </div>
        </div>

    </div>

    <script>
        async function loadAnalytics() {
            try {
                const res = await fetch('/api/analytics');
                const data = await res.json();
                renderDashboard(data);
            } catch (err) {
                document.getElementById('section-chart').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Could not load analytics. Make sure the server is running.</p>
                    </div>`;
            }
        }

        function renderDashboard(data) {
            const today = new Date().toISOString().split('T')[0];

            // Top stats
            document.getElementById('total-visits').textContent = data.totalVisits.toLocaleString();
            document.getElementById('unique-visitors').textContent = data.uniqueVisitors.toLocaleString();
            document.getElementById('today-visits').textContent = (data.dailyVisits[today] || 0).toLocaleString();

            // Top section
            const sections = data.sectionViews;
            const topEntry = Object.entries(sections).sort((a, b) => b[1] - a[1])[0];
            const topSection = topEntry ? capitalize(topEntry[0]) : '—';
            document.getElementById('top-section').textContent = topSection;

            // Section bar chart
            renderSectionChart(sections);

            // Daily visits
            renderDailyChart(data.dailyVisits);

            // Recent visits
            renderRecentVisits(data.recentVisits);
        }

        function renderSectionChart(sections) {
            const container = document.getElementById('section-chart');
            const entries = Object.entries(sections).sort((a, b) => b[1] - a[1]);
            const maxVal = Math.max(...entries.map(e => e[1]), 1);

            if (entries.every(e => e[1] === 0)) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-chart-bar"></i>
                        <p>No section views recorded yet.</p>
                    </div>`;
                return;
            }

            let html = '';
            entries.forEach(([name, count]) => {
                const pct = (count / maxVal) * 100;
                html += `
                    <div class="bar-row">
                        <span class="bar-label">${capitalize(name)}</span>
                        <div class="bar-track">
                            <div class="bar-fill" style="width: ${Math.max(pct, 3)}%">${count}</div>
                        </div>
                    </div>`;
            });
            container.innerHTML = html;
        }

        function renderDailyChart(dailyVisits) {
            const container = document.getElementById('daily-chart');
            const days = [];
            for (let i = 13; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const key = d.toISOString().split('T')[0];
                days.push({ date: key, count: dailyVisits[key] || 0 });
            }

            const maxVal = Math.max(...days.map(d => d.count), 1);

            if (days.every(d => d.count === 0)) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-calendar-alt"></i>
                        <p>No daily visits recorded yet.</p>
                    </div>`;
                return;
            }

            let html = '';
            days.forEach(day => {
                const height = (day.count / maxVal) * 140 + 4;
                const dateLabel = day.date.slice(5); // MM-DD
                html += `
                    <div class="daily-bar-wrapper">
                        <div class="daily-bar-count">${day.count || ''}</div>
                        <div class="daily-bar" style="height: ${height}px" title="${day.date}: ${day.count} visits"></div>
                        <div class="daily-bar-date">${dateLabel}</div>
                    </div>`;
            });
            container.innerHTML = html;
        }

        function renderRecentVisits(visits) {
            const container = document.getElementById('recent-visits-container');

            if (!visits || visits.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-history"></i>
                        <p>No recent visits recorded yet.</p>
                    </div>`;
                return;
            }

            let html = `
                <table class="recent-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Time</th>
                            <th>Visitor (Masked IP)</th>
                            <th>Browser / Device</th>
                        </tr>
                    </thead>
                    <tbody>`;

            visits.slice(0, 25).forEach((v, i) => {
                const time = new Date(v.timestamp);
                const timeStr = time.toLocaleString();
                const browser = parseBrowser(v.userAgent);
                html += `
                    <tr>
                        <td>${i + 1}</td>
                        <td><span class="time-badge">${timeStr}</span></td>
                        <td>${v.ip}</td>
                        <td>${browser}</td>
                    </tr>`;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function parseBrowser(ua) {
            if (!ua) return 'Unknown';
            if (ua.includes('Edg/')) return 'Edge';
            if (ua.includes('Chrome/')) return 'Chrome';
            if (ua.includes('Firefox/')) return 'Firefox';
            if (ua.includes('Safari/') && !ua.includes('Chrome')) return 'Safari';
            if (ua.includes('Opera') || ua.includes('OPR/')) return 'Opera';
            return ua.substring(0, 40) + '...';
        }

        function capitalize(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        async function resetAnalytics() {
            if (!confirm('Are you sure you want to reset all analytics data? This cannot be undone.')) return;

            try {
                const res = await fetch('/api/analytics/reset', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    loadAnalytics();
                }
            } catch (err) {
                alert('Failed to reset analytics.');
            }
        }

        // Auto-load on page load
        loadAnalytics();

        // Auto-refresh every 30 seconds
        setInterval(loadAnalytics, 30000);
    </script>

</body>
</html>
